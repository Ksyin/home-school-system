<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login</title><link rel="stylesheet" href="assets/css/styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/config.js"></script><script src="assets/js/supabase-client.js"></script><script src="assets/js/ui.js"></script><script src="assets/js/auth.js"></script></head>
<body>
<div class="auth-shell"><div class="auth-hero"><div><div class="badge info" style="margin-bottom:16px;background:rgba(255,255,255,.14);color:#fff">Parent · Tutor · Student</div><h1 style="font-size:58px;line-height:1.02;margin:0 0 16px;font-family:Georgia,ui-serif,serif">Sign in to your learning space.</h1><p style="max-width:700px;font-size:18px;line-height:1.7;color:#d9e3ff">Parents follow progress, tutors assign and assess, students view work and submit evidence.</p></div></div><div class="auth-card"><div class="auth-box"><h2>Welcome back</h2><p>Enter your email and password to continue.</p><form id="loginForm"><div class="field"><label>Email</label><input type="email" name="email" required></div><div class="field"><label>Password</label><input type="password" name="password" required></div><div class="auth-actions"><button class="btn" type="submit">Login</button></div></form><div class="footer-note">No account yet? <a class="auth-link" href="register.html">Register</a></div></div></div></div>
<script>
(async function(){
  if (!window.__supabaseConfigMissing && window.sb) {
    const { data } = await sb.auth.getUser();
    if (data.user) {
      const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
      if (profile?.role) location.href = `/${profile.role}/` + (profile.role==='student' ? 'dashboard.html' : 'dashboard.html');
    }
  }
  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = this.querySelector('button');
    try {
      UI.setLoading(btn, true);
      const fd = new FormData(this);
      await Auth.signIn(fd.get('email'), fd.get('password'));
      const bundle = await Auth.currentProfile();
      location.href = `/${bundle.profile.role}/dashboard.html`;
    } catch(err){ UI.toast(err.message, 'error'); }
    finally{ UI.setLoading(btn, false); }
  });
})();
</script>
</body></html>
