  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .report-card {
      background: var(--surface-1);

      <div class="topbar">

        <p>Performance summaries and feedback</p>

      <div id="page-content"></div>
    </main>
  </div>
  <script type="module" src="/assets/js/pages.js"></script>
