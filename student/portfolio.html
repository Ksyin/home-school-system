<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Portfolio</title>

  <link rel="stylesheet" href="/assets/css/styles.css">

  <style>
    .portfolio-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
    }

    .portfolio-feed {
      display: grid;
      gap: 16px;
    }

    .portfolio-card {
      background: var(--surface);
      padding: 16px;
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      transition: 0.2s ease;
    }

    .portfolio-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .tag {
      font-size: 12px;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .portfolio-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body
  data-role="student"
  data-page="portfolio"
  data-title="My Portfolio"
  data-description="Track your growth, reflections, achievements, and uploads."
>

  <!-- APP SHELL -->
  <div id="app-shell">

    <!-- TOPBAR -->
    <header class="topbar">
      <h2>My Portfolio</h2>
      <p>Track your learning journey and growth</p>
    </header>

    <!-- MAIN -->
    <main id="page-content">

      <div class="portfolio-grid">

        <!-- LEFT: FORM -->
        <div class="card panel">
          <h3>Add New Entry</h3>

          <form id="portfolioForm" class="stack-form">

            <div class="form-row">
              <label>Type</label>
              <select id="portfolioType">
                <option value="Achievement">Achievement</option>
                <option value="Progress">Progress</option>
                <option value="Challenge">Challenge</option>
                <option value="Reflection">Reflection</option>
              </select>
            </div>

            <div class="form-row">
              <label>Title</label>
              <input id="portfolioTitle" placeholder="What did you achieve?">
            </div>

            <div class="form-row">
              <label>Details</label>
              <textarea id="portfolioNote" rows="4" placeholder="Explain your progress..."></textarea>
            </div>

            <div class="form-row">
              <label>Upload File</label>
              <input id="portfolioFile" type="file">
            </div>

            <div class="form-actions">
              <button class="btn" type="submit">Save Entry</button>
              <span id="portfolioMsg"></span>
            </div>

          </form>
        </div>

        <!-- RIGHT: FEED -->
        <div>

          <h3>My Journey</h3>

          <div class="portfolio-feed" id="portfolioFeed">
            <!-- JS FILLS THIS -->
            <div class="empty">Start your journey 🚀</div>
          </div>

        </div>

      </div>

    </main>

  </div>

  <script src="/assets/js/pages.js"></script>

</body>
</html>
