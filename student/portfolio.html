<div id="page-content">

  <!-- UPLOAD -->
  <section class="card panel">
    <h3>Upload to Portfolio</h3>

    <form id="portfolioForm" class="stack-form">

      <div class="form-row">
        <label>Note / Description</label>
        <textarea id="portfolioNote" rows="4" placeholder="Explain this work..."></textarea>
      </div>

      <div class="form-row">
        <label>Upload File</label>
        <input type="file" id="portfolioFile">
      </div>

      <div class="form-row">
        <label>Status (optional)</label>
        <select id="portfolioStatus">
          <option value="normal">Normal</option>
          <option value="high">High Performance</option>
          <option value="low">Needs Improvement</option>
        </select>
      </div>

      <div class="form-actions">
        <button class="btn" type="submit">Upload</button>
        <span id="portfolioMsg"></span>
      </div>

    </form>
  </section>

  <!-- LIST -->
  <section class="card panel" style="margin-top:20px">
    <h3>My Portfolio Items</h3>
    <div id="portfolioList"></div>
  </section>

</div>
