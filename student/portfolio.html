<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Portfolio</title>

<link rel="stylesheet" href="/assets/css/styles.css">

<style>
.portfolio-layout {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 20px;
}

@media(max-width: 900px){
  .portfolio-layout {
    grid-template-columns: 1fr;
  }
}

.portfolio-card {
  padding: 16px;
  border-radius: 16px;
  background: var(--surface);
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.portfolio-feed {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.feed-item {
  padding: 14px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid #eee;
}

.feed-item img,
.feed-item video {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.tag {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 12px;
  background: #eef3ff;
  margin-right: 6px;
}

.meta {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body data-role="student" data-page="portfolio">

<div id="app-shell">

<main class="content">
  <div class="topbar">
    <h2>My Learning Journey</h2>
    <p>Track growth, challenges, reflections & achievements</p>
  </div>

  <div id="page-content"></div>

</main>
</div>

<script type="module" src="/assets/js/pages.js"></script>
</body>
</html>
