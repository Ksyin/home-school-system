<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Portfolio</title>
<link rel="stylesheet" href="/assets/css/styles.css">

<style>
/* 🔥 modern portfolio styling */
.portfolio-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.portfolio-form textarea {
  min-height: 120px;
}

.portfolio-card {
  padding: 16px;
  border-radius: 16px;
  background: var(--surface);
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.portfolio-feed {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 20px;
}

.tag {
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 12px;
  background: #eef3ff;
}
</style>
</head>

<body data-role="student" data-page="portfolio">

<div id="app-shell">

<main class="content">

  <div class="topbar">
    <h2>My Portfolio</h2>
    <p>Track your growth, challenges, and achievements</p>
  </div>

  <div id="page-content"></div>

</main>
</div>

<script type="module" src="/assets/js/pages.js"></script>
</body>
</html>
