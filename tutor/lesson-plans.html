<!doctype html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lesson Plans</title>

<link rel="stylesheet" href="/assets/css/styles.css">

</head>

<body
data-role="tutor"
data-page="lesson-plans"
data-title="Lesson Plans"
data-description="Create, manage, and publish tutor lesson plans."
>

<div id="app-shell" class="page-shell">

<!-- fallback UI if JS fails -->
<div class="content">

<h2>Lesson Plans</h2>

<div id="page-content">

<section class="card panel">

<h3>Create Lesson Plan</h3>

<form id="lessonPlanForm">

<label>Lesson Title</label>
<input id="planTitle" type="text">

<label>Subject</label>
<input id="planSubject" type="text">

<label>Classroom</label>
<input id="planClassroom" type="text">

<label>Date</label>
<input id="planDate" type="date">

<label>Objectives</label>
<textarea id="planObjectives"></textarea>

<label>Materials</label>
<textarea id="planMaterials"></textarea>

<button type="submit">Save Lesson Plan</button>

</form>

</section>

</div>

</div>

</div>

<script type="module" src="/assets/js/pages.js"></script>

</body>
</html>
