<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reports</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .report-form {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .report-preview {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .report-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body
  data-role="tutor"
  data-page="reports"
  data-title="Reports"
  data-description="Create progress reports with highs, lows, summaries, next steps, and attachments."
>
  <div id="app-shell" class="page-shell">
    <main class="content">
      <div class="topbar">
        <div>
          <h2>Reports</h2>
          <p>Create progress reports with highs, lows, summaries, next steps, and attachments.</p>
        </div>
      </div>
      <div id="page-content"></div>
    </main>
  </div>

  <script type="module" src="/assets/js/pages.js"></script>

</html>
