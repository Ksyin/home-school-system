<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Tutor Dashboard</title>

<link rel="stylesheet" href="assets/css/main.css">

<style>

.studentGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
}

.studentCard{
padding:18px;
background:#fff;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.studentCard h3{
margin:0 0 6px;
}

.studentCard button{
margin-top:10px;
padding:8px 14px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>


<body>

<h1>Tutor Dashboard</h1>

<h2>All Students</h2>

<div id="studentGrid" class="studentGrid"></div>


<script src="assets/js/data.js"></script>

<script>

async function loadStudents(){

  const students = await DataAPI.getAllStudents()

  const container = document.getElementById("studentGrid")

  container.innerHTML=""

  students.forEach(student=>{

    const card=document.createElement("div")

    card.className="studentCard"

    card.innerHTML=`

      <h3>${student.full_name}</h3>
      <p>${student.email}</p>
      <p>Grade: ${student.grade_level || "-"}</p>

      <button onclick="openStudent('${student.id}')">
      View Activity
      </button>

    `

    container.appendChild(card)

  })

}

function openStudent(studentId){

  window.location="tutor-student.html?id="+studentId

}

loadStudents()

</script>

</body>
</html>
