<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Messages</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .message-thread {
      background: white;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .message-header {
      background: #3498db;
      color: white;
      padding: 12px 16px;
      cursor: pointer;
    }
    .message-body {
      padding: 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    .reply-area {
      padding: 16px;
      background: #f8f9fa;
    }
    .message-bubble {
      background: #e3f2fd;
      padding: 10px 14px;
      border-radius: 18px;
      margin-bottom: 8px;
      max-width: 80%;
    }
    .message-bubble.tutor {
      background: #3498db;
      color: white;
      margin-left: auto;
    }
  </style>
</head>
<body
  data-role="tutor"
  data-page="messages"
  data-title="Messages"
  data-description="Send messages to students and keep communication records."
>
  <div id="app-shell" class="page-shell">
    <main class="content">
      <div class="topbar">
        <div>
          <h2>Messages</h2>
          <p>Send messages to students and keep communication records.</p>
        </div>
      </div>
      <div id="page-content"></div>
    </main>
  </div>

  <script type="module" src="/assets/js/pages.js"></script>
</body>
</html>
